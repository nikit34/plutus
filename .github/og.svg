<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="240" fill="url(#accent)" opacity="0.18"/>
  <circle cx="180" cy="540" r="200" fill="url(#accent)" opacity="0.10"/>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, Roboto, sans-serif">
    <text x="80" y="180" font-size="44" font-weight="600" fill="#94a3b8" letter-spacing="2">OPEN-SOURCE CREATOR COMMERCE</text>
    <text x="80" y="300" font-size="128" font-weight="800" fill="#f8fafc">Plutus</text>
    <text x="80" y="380" font-size="40" font-weight="500" fill="#cbd5e1">Sell digital products via Stripe.</text>
    <text x="80" y="430" font-size="40" font-weight="500" fill="#cbd5e1">Self-hostable. MIT licensed.</text>
    <g transform="translate(80, 510)">
      <rect width="220" height="56" rx="28" fill="url(#accent)"/>
      <text x="110" y="36" font-size="22" font-weight="700" fill="#0b0f1a" text-anchor="middle">github.com/nikit34/plutus</text>
    </g>
    <text x="80" y="600" font-size="22" fill="#64748b">React · Node · Postgres · Stripe Connect · Resend</text>
  </g>
</svg>

name: Bug report
description: Something is broken or behaves unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. For security issues, use the **Security** link instead — don't post here.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
      placeholder: When I do X, I expect Y, but I see Z.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Browser + OS for frontend bugs; Node version + DB for backend bugs.
      placeholder: "Chrome 120 on macOS 15 / Node 20.11 / Postgres 16"
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse --short HEAD` if self-hosted, or "live demo" if reproducing on plutus.firstmessage.ru.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      render: shell

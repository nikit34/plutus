    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Plutus",
        "url": "https://plutus.firstmessage.ru/",

      }

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Plutus",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://plutus.firstmessage.ru/",
        "description": "Creator platform for selling digital products with card and crypto checkout and instant payouts.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free to start. 5% flat fee per sale."
        }
      }
    </script>
    <!-- FAQ JSON-LD: kept in sync with src/pages/Landing.jsx FAQ section.
         Static here so Yandex/Google bots pick it up without executing JS. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What can I sell on Plutus?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Digital products: eBooks, Notion templates, Figma files, video courses, cheat sheets, prompt packs, music samples — anything you can deliver via a file, a link, or text. Physical goods are not supported."
            }
          },
          {
            "@type": "Question",
            "name": "How much does Plutus cost?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "5% per sale. No monthly, no setup, no listing fees. You also pay standard Stripe (2.9% + $0.30) or NOWPayments (~0.5%) network fees."
            }
          },
          {
            "@type": "Question",
            "name": "How do payouts work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Two options. Bank payouts via Stripe Connect arrive in 1–2 business days. Crypto payouts via NOWPayments (USDT-TRC20/ERC20/BSC, BTC, ETH, USDC) arrive in 5–30 minutes on-chain."
            }
          },
          {
            "@type": "Question",
            "name": "Can buyers pay in crypto?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Every product page shows both a card-checkout button (Stripe) and a crypto-checkout button (NOWPayments). Buyers choose how they pay."
            }
          },
          {
            "@type": "Question",
            "name": "Do I need a website?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Every product gets a hosted page at plutus.firstmessage.ru/product/your-slug. Share the link anywhere."
            }
          },
          {
            "@type": "Question",
            "name": "Is my file protected?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Files are stored server-side and delivered via signed, time-limited download links. Each buyer gets a unique token."
            }
          },
          {
            "@type": "Question",
            "name": "Can I migrate from Gumroad?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. Recreate your products on Plutus and redirect your audience via one tweet or email — the first sale usually covers migration effort many times over."
            }
          }
        ]
      }
    </script>

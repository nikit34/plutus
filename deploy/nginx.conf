# /etc/nginx/sites-available/plutus
# Serves the frontend from /var/www/plutus and proxies /api + /files to Node.
# Replace placeholders and run `certbot --nginx -d plutus.firstmessage.ru`.

upstream plutus_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name plutus.firstmessage.ru;

    # Certbot will inject the 443 block and redirect 80 -> 443

    # -------------- Frontend (SPA) --------------
    root /var/www/plutus;
    index index.html;

    # Vite build assets are fingerprinted — aggressive cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------- Stripe webhook --------------
    # Stripe needs the RAW body — no buffering, exact URI.
    location = /api/webhooks/stripe {
        proxy_pass http://plutus_backend;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        client_max_body_size 1m;
    }

    # -------------- API --------------
    location /api/ {
        proxy_pass http://plutus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # Allow large uploads (covers, product files). Mirror MAX_UPLOAD_MB.
        client_max_body_size 110m;
    }

    # -------------- Static uploads (covers, avatars) --------------
    location /files/ {
        proxy_pass http://plutus_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Let the Node-set Cache-Control pass through
        proxy_read_timeout 60s;
        client_max_body_size 1m;
    }

    # -------------- SPA fallback --------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss;
}
